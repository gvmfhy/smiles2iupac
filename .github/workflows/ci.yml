name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.12-

      # Java is required for py2opsin (OPSIN round-trip validation) — needed by
      # tests/test_accuracy_offline.py to score Tier 2 correctness. STOUT is gated
      # off on Python 3.12 via env marker, so .[dev,ml] installs ONLY py2opsin
      # from [ml] (no TensorFlow bloat).
      - name: Setup Java 17 (for py2opsin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install (core + dev + ml + web + mcp; STOUT excluded by env marker on 3.12)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,ml,web,mcp]

      - name: Lint (ruff)
        run: ruff check src tests app scripts

      - name: Test (pytest)
        run: pytest -q
