# Deploys to Hugging Face Spaces. MANUAL TRIGGER ONLY for now.
#
# Space exists at https://huggingface.co/spaces/agwgwa/smiles2iupac (SDK=Docker).
# To enable this workflow:
#   1. Add repo secret HF_TOKEN with write scope (Settings → Secrets → Actions)
#      Generate token at: https://huggingface.co/settings/tokens
#   2. Change `on:` to add `push: branches: [main]` for auto-deploy on push.
#
# Note: the recommended deploy path right now is local `hf upload` from the
# project dir after `hf auth login` — this workflow is the future-automation
# scaffold and isn't required for the initial deploy.
name: Deploy to Hugging Face Spaces

on:
  workflow_dispatch:  # manual trigger only — would 401 without HF_TOKEN secret

jobs:
  deploy:
    name: Push to HF Space
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # HF rejects shallow pushes

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "120282195+gvmfhy@users.noreply.github.com"
          git config user.name "Austin Morrissey"
          # HF auth uses the user that owns the token; agwgwa is the HF
          # account that owns the target Space.
          git push --force "https://agwgwa:$HF_TOKEN@huggingface.co/spaces/agwgwa/smiles2iupac" main
