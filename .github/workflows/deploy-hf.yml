# Deploys to Hugging Face Spaces. MANUAL TRIGGER ONLY until the Space exists.
#
# Before this workflow can succeed:
#   1. Create the Space at https://huggingface.co/new-space (gvmfhy/smiles2iupac, SDK=Docker)
#   2. Add repo secret HF_TOKEN with write scope (Settings → Secrets → Actions)
#   3. Generate token: https://huggingface.co/settings/tokens
#
# After step 1 + 2, change `on:` to add `push: branches: [main]` to enable auto-deploy.
name: Deploy to Hugging Face Spaces

on:
  workflow_dispatch:  # manual trigger only — would 401 without HF_TOKEN secret

jobs:
  deploy:
    name: Push to HF Space
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # HF rejects shallow pushes

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "120282195+gvmfhy@users.noreply.github.com"
          git config user.name "Austin Morrissey"
          git push --force "https://gvmfhy:$HF_TOKEN@huggingface.co/spaces/gvmfhy/smiles2iupac" main
