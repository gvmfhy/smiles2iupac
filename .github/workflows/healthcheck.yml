# Free uptime monitor: would ping HF Spaces /health every 10 minutes.
# DISABLED until the HF Space at https://gvmfhy-smiles2iupac.hf.space exists.
# Re-enable by uncommenting the `schedule` block below; failures will then
# appear in the Actions tab as a free uptime monitor.
name: Healthcheck

on:
  workflow_dispatch:  # manual only until the Space exists
  # schedule:
  #   - cron: "*/10 * * * *"

jobs:
  ping:
    name: GET /health
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping HF Space
        run: |
          set -euo pipefail
          URL="https://gvmfhy-smiles2iupac.hf.space/health"
          # -f fails on non-2xx; -sS hides progress but shows errors; --max-time guards against hangs
          response=$(curl -fsS --max-time 30 "$URL")
          echo "Response: $response"
          # Hard-fail unless body contains the expected status field.
          echo "$response" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"' \
            || { echo "Health endpoint did not return status=ok"; exit 1; }
